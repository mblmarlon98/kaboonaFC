name: Scrape League Data

on:
  schedule:
    # Every Monday at 8:00 AM UTC (4:00 PM MYT)
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape league standings
        run: node scripts/scrape-league.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/league-live.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/league-live.json
          git commit -m "chore: update league standings (automated)"
          git push
